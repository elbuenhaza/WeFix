<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeFix — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f4f4f6;
      --brand: #123853;
      --accent:#f87171;
      --white: #ffffff;
      --border:#dde1e7;
      --text:  #1a1a2e;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 500px; margin: 0 auto; min-height: 100vh;
    }

    /* NAVBAR */
    .wf-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .wf-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--brand); text-decoration: none;
    }
    .wf-logo-icon {
      width: 32px; height: 32px;
      border: 2px solid var(--brand); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .wf-back {
      background: none; border: none;
      display: flex; align-items: center; gap: 6px;
      color: var(--brand); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: 'Poppins', sans-serif;
    }
    .wf-back svg { width: 18px; height: 18px; }

    /* PROFILE HEADER */
    .wf-profile-header {
      background: var(--white);
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .wf-big-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 600; color: var(--white);
      margin-bottom: 12px; position: relative;
    }
    .wf-big-avatar .verified-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: #22c55e; border: 2px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--white); font-weight: 700;
    }
    .wf-profile-name {
      font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px;
    }
    .wf-profile-prof {
      font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 8px;
    }
    .wf-profile-stars {
      display: flex; gap: 3px; margin-bottom: 6px; justify-content: center;
    }
    .wf-profile-stars span { font-size: 16px; }
    .wf-star-filled { color: #f5a623; }
    .wf-star-empty  { color: #ddd; }
    .wf-profile-rating-text {
      font-size: 12px; color: var(--muted); margin-bottom: 12px;
    }
    .wf-profile-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
    .wf-tag {
      background: #e8f0fb; color: var(--brand);
      border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 500;
    }
    .wf-tag.accent { background: #fde8e8; color: #b91c1c; }
    .wf-hire-btn {
      background: var(--brand); color: var(--white);
      border: none; border-radius: 24px;
      padding: 12px 40px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      transition: background .18s;
    }
    .wf-hire-btn:hover { background: #1a4f72; }

    /* SECTIONS */
    .wf-section {
      background: var(--white);
      margin: 12px 12px 0;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 16px;
    }
    .wf-section h3 {
      font-size: 13px; font-weight: 600;
      color: var(--brand); margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .wf-section p {
      font-size: 13px; color: var(--muted); line-height: 1.6;
    }

    /* INFO ROWS */
    .wf-info-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .wf-info-row:last-child { border-bottom: none; }
    .wf-info-row .label { color: var(--muted); }
    .wf-info-row .value { font-weight: 500; color: var(--text); }
    .wf-info-row .value.price { color: var(--accent); font-weight: 600; }

    /* REVIEWS */
    .wf-review {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .wf-review:last-child { border-bottom: none; }
    .wf-review-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 4px;
    }
    .wf-review-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .wf-review-stars { display: flex; gap: 2px; }
    .wf-review-stars span { font-size: 12px; }
    .wf-review-text { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* CALENDAR */
    .wf-calendar-hint {
      font-size: 12px; color: var(--muted); margin-bottom: 10px;
    }
    .wf-date-input {
      width: 100%; font-family: 'Poppins', sans-serif;
      font-size: 13px; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; outline: none; background: var(--bg);
      margin-bottom: 10px;
    }
    .wf-date-input:focus { border-color: var(--brand); }
    .wf-confirm-btn {
      width: 100%; background: var(--brand); color: var(--white);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'Poppins', sans-serif; transition: background .18s;
    }
    .wf-confirm-btn:hover { background: #1a4f72; }
    .wf-confirm-msg {
      display: none; margin-top: 10px; text-align: center;
      font-size: 13px; color: #16a34a; font-weight: 500;
    }

    .wf-spacer { height: 24px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="wf-nav">
  <button class="wf-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    Volver
  </button>
  <a class="wf-logo" href="wefix-home.html">
    <div class="wf-logo-icon">W</div>
    WeFix
  </a>
  <div style="width:60px;"></div>
</nav>

<!-- PROFILE (populated by JS) -->
<div id="profileContent"></div>

<script>
const professionals = [
  { id:1,  name:"Jose Torres",       prof:"chofer",   label:"Chofer",              stars:4, price:350, verified:true,  desc:"Hola soy Jose Torres, hablo español e inglés. 5 años de experiencia en traslados privados y ejecutivos. Cuento con unidad propia de alta gama, puntualidad garantizada." },
  { id:2,  name:"Margarita Flores",  prof:"limpieza", label:"Servicio de limpieza",stars:5, price:250, verified:true,  desc:"Especialista en limpieza profunda de hogares y oficinas. Trabajo con productos eco-amigables y técnicas modernas. Más de 200 clientes satisfechos." },
  { id:3,  name:"Joaquín R",         prof:"chef",     label:"Chef",                stars:4, price:600, verified:false, desc:"Chef con 8 años de experiencia en cocina mexicana e internacional. Especialidad en menús de degustación para eventos privados." },
  { id:4,  name:"Ana Méndez",        prof:"jardinero",label:"Jardinero",           stars:5, price:200, verified:true,  desc:"Diseño y mantenimiento de jardines. Poda, riego y paisajismo personalizado. Certificada en horticultura." },
  { id:5,  name:"Carlos Vega",       prof:"carwash",  label:"Car Wash",            stars:3, price:150, verified:false, desc:"Lavado y encerado profesional a domicilio. Llevo todos mis equipos. Servicio rápido y económico." },
  { id:6,  name:"Sofía Ríos",        prof:"mascotas", label:"Paseo de mascotas",   stars:5, price:120, verified:true,  desc:"Amante de los animales. Paseos diarios y cuidado en casa. Zona norte CDMX. Referencias disponibles." },
  { id:7,  name:"Luis Paredes",      prof:"chofer",   label:"Chofer",              stars:4, price:400, verified:true,  desc:"Transporte ejecutivo, aeropuerto y eventos. Discreción garantizada. Inglés avanzado." },
  { id:8,  name:"Elena Castro",      prof:"limpieza", label:"Servicio de limpieza",stars:4, price:280, verified:true,  desc:"Limpieza post-obra, mudanzas y mantenimiento semanal. Gran puntualidad. Zona sur y poniente CDMX." },
  { id:9,  name:"Pedro Morales",     prof:"chef",     label:"Chef",                stars:5, price:750, verified:true,  desc:"Chef privado para eventos y cenas íntimas. Especialidad en cocina de autor y maridajes." },
  { id:10, name:"Diana López",       prof:"jardinero",label:"Jardinero",           stars:4, price:180, verified:false, desc:"Plantas de interior y exterior. Huertos urbanos y terrazas. Asesoría en selección de especies." },
  { id:11, name:"Roberto Núñez",     prof:"carwash",  label:"Car Wash",            stars:4, price:180, verified:true,  desc:"Detailing profesional. Pintura, tapicería y limpieza de motor. Resultados de concesionaria." },
  { id:12, name:"Paola Herrera",     prof:"mascotas", label:"Paseo de mascotas",   stars:5, price:140, verified:true,  desc:"Cuidado de mascotas, paseos grupales e individuales. Zona sur CDMX. Primeros auxilios para animales." },
  { id:13, name:"Miguel Ángel R",    prof:"chofer",   label:"Chofer",              stars:3, price:300, verified:false, desc:"Traslados locales y foráneos. Puntual y seguro. Disponibilidad 24/7." },
  { id:14, name:"Fernanda Cruz",     prof:"chef",     label:"Chef",                stars:4, price:500, verified:true,  desc:"Comida saludable, planes nutricionales y meal prep semanal. Nutrióloga certificada." },
  { id:15, name:"Tomás Espinoza",    prof:"jardinero",label:"Jardinero",           stars:5, price:220, verified:true,  desc:"Jardines zen, instalación de pasto y control de plagas. 10 años de experiencia en el sector." },
];

const reviews = {
  1: [{name:"Karen M.", stars:5, text:"Muy puntual y profesional. Lo recomiendo ampliamente."},{name:"Rodrigo P.", stars:4, text:"Buen servicio, llegó a tiempo y su unidad estaba muy limpia."}],
  2: [{name:"Laura T.", stars:5, text:"Dejó mi casa impecable, super detallista."},{name:"Carlos A.", stars:5, text:"Excelente trabajo, muy confiable y discreta."}],
  3: [{name:"Ivonne R.", stars:4, text:"La cena estuvo deliciosa, todos quedaron encantados."},{name:"Marcos F.", stars:4, text:"Muy profesional, buena sazón y presentación."}],
  default:[{name:"Usuario WeFix", stars:4, text:"Muy buen servicio, lo contrataría de nuevo."},{name:"Cliente satisfecho", stars:5, text:"Profesional y puntual, excelente experiencia."}]
};

function starsHTML(n, size=14) {
  return [1,2,3,4,5].map(i=>
    `<span style="font-size:${size}px" class="${i<=n?'wf-star-filled':'wf-star-empty'}">★</span>`
  ).join('');
}

function initials(name){ return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

const params = new URLSearchParams(window.location.search);
const id     = parseInt(params.get('id')) || 1;
const pro    = professionals.find(p=>p.id===id) || professionals[0];
const revs   = reviews[pro.id] || reviews.default;

const content = document.getElementById('profileContent');
content.innerHTML = `
  <div class="wf-profile-header">
    <div class="wf-big-avatar" style="background:#123853">
      ${initials(pro.name)}
      ${pro.verified ? '<div class="verified-badge">✓</div>' : ''}
    </div>
    <div class="wf-profile-name">${pro.name}</div>
    <div class="wf-profile-prof">${pro.label}</div>
    <div class="wf-profile-stars">${starsHTML(pro.stars, 18)}</div>
    <div class="wf-profile-rating-text">${pro.stars}.0 / 5 — ${revs.length} reseñas</div>
    <div class="wf-profile-tags">
      <span class="wf-tag">${pro.label}</span>
      ${pro.verified ? '<span class="wf-tag">✓ Verificado</span>' : ''}
      <span class="wf-tag accent">$${pro.price}/hr</span>
    </div>
    <button class="wf-hire-btn" id="hireBtn">Contratar ahora</button>
  </div>

  <div class="wf-section">
    <h3>Sobre mí</h3>
    <p>${pro.desc}</p>
  </div>

  <div class="wf-section">
    <h3>Información</h3>
    <div class="wf-info-row"><span class="label">Profesión</span><span class="value">${pro.label}</span></div>
    <div class="wf-info-row"><span class="label">Precio por hora</span><span class="value price">$${pro.price} MXN</span></div>
    <div class="wf-info-row"><span class="label">Calificación</span><span class="value">${pro.stars}/5 ★</span></div>
    <div class="wf-info-row"><span class="label">Perfil verificado</span><span class="value">${pro.verified ? '✓ Sí' : '✗ No'}</span></div>
    <div class="wf-info-row"><span class="label">Idiomas</span><span class="value">Español, Inglés</span></div>
  </div>

  <div class="wf-section">
    <h3>Agendar cita</h3>
    <p class="wf-calendar-hint">Selecciona una fecha para ver disponibilidad</p>
    <input type="date" class="wf-date-input" id="fechaCita"/>
    <button class="wf-confirm-btn" id="confirmBtn">Verificar disponibilidad</button>
    <div class="wf-confirm-msg" id="confirmMsg">✓ ¡${pro.name} está disponible! Te contactará pronto.</div>
  </div>

  <div class="wf-section">
    <h3>Reseñas</h3>
    ${revs.map(r=>`
      <div class="wf-review">
        <div class="wf-review-header">
          <span class="wf-review-name">${r.name}</span>
          <div class="wf-review-stars">${starsHTML(r.stars,12)}</div>
        </div>
        <div class="wf-review-text">${r.text}</div>
      </div>
    `).join('')}
  </div>

  <div class="wf-spacer"></div>
`;

document.getElementById('confirmBtn').addEventListener('click', () => {
  const fecha = document.getElementById('fechaCita').value;
  const msg   = document.getElementById('confirmMsg');
  if (!fecha) { alert('Por favor selecciona una fecha.'); return; }
  msg.style.display = 'block';
});

document.getElementById('hireBtn').addEventListener('click', () => {
  const fecha = document.getElementById('fechaCita');
  fecha.focus();
  fecha.scrollIntoView({ behavior: 'smooth', block: 'center' });
});
</script>
</body>
</html>
