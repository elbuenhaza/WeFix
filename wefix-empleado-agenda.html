<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeFix — Mi Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase + capa de sesion WeFix (portal profesional; exige login) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="wefix-auth.js" data-guard="require" data-role="profesional"></script>

  <style>
    :root{--bg:#f4f4f6;--brand:#123853;--accent:#f87171;--white:#fff;--border:#dde1e7;--text:#1a1a2e;--muted:#6b7280;--green:#22c55e;--onyx-a:#fbbf24;--onyx-b:#f97316;--shadow:0 2px 12px rgba(18,56,83,.10);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:80px;}

    .wf-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .wf-logo{display:flex;align-items:center;gap:8px;font-family:'Raleway',sans-serif;font-size:20px;font-weight:700;color:var(--brand);text-decoration:none;}
    .wf-logo-icon{width:32px;height:32px;border:2px solid var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--brand);}

    /* TABS */
    .wf-agenda-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;}
    .wf-agenda-tab{flex:1;padding:12px 0;font-size:13px;font-weight:500;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Poppins',sans-serif;transition:all .15s;}
    .wf-agenda-tab.active{color:var(--brand);border-bottom-color:var(--brand);}

    /* STATS BANNER */
    .wf-stats-banner{background:var(--brand);padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;}
    .wf-stat-item{text-align:center;padding:4px;}
    .wf-stat-num{font-size:22px;font-weight:700;color:var(--white);}
    .wf-stat-lbl{font-size:10px;color:rgba(255,255,255,.6);}

    /* SECTIONS */
    .wf-agenda-section{padding:14px 16px;}
    .wf-section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}

    /* JOB CARD */
    .wf-job-card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:border .15s;}
    .wf-job-card:hover{border-color:var(--brand);}
    .wf-job-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
    .wf-job-type-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .wf-job-type-icon.normal{background:#e8f0fb;}
    .wf-job-type-icon.flash{background:linear-gradient(135deg,#fbbf24,#f97316);}
    .wf-job-type-icon.premium{background:linear-gradient(135deg,#7c3aed,#4f46e5);}
    .wf-job-card-info{flex:1;min-width:0;}
    .wf-job-card-client{font-size:13px;font-weight:600;color:var(--text);}
    .wf-job-card-service{font-size:11px;color:var(--muted);}
    .wf-job-card-right{text-align:right;}
    .wf-job-card-price{font-size:14px;font-weight:700;color:var(--brand);}
    .wf-job-card-date{font-size:10px;color:var(--muted);margin-top:2px;}
    .wf-job-card-body{padding:10px 14px;}
    .wf-job-meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
    .wf-job-meta{font-size:11px;color:var(--muted);}
    .wf-job-meta strong{color:var(--text);font-weight:500;}
    .wf-job-status-row{display:flex;align-items:center;justify-content:space-between;}
    .wf-job-status{font-size:10px;font-weight:700;border-radius:20px;padding:3px 10px;}
    .wf-job-status.confirmed{background:#dcfce7;color:#16a34a;}
    .wf-job-status.pending{background:#fef3c7;color:#92400e;}
    .wf-job-status.completed{background:#e8f0fb;color:var(--brand);}
    .wf-job-status.cancelled{background:#fee2e2;color:#dc2626;}

    /* REVIEW SECTION inside job card */
    .wf-review-section{background:var(--bg);border-top:1px solid var(--border);padding:12px 14px;}
    .wf-review-header-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .wf-review-client-avatar{width:30px;height:30px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white);}
    .wf-review-client-name{font-size:12px;font-weight:600;color:var(--text);}
    .wf-review-stars-row{display:flex;align-items:center;gap:3px;margin-top:1px;}
    .wf-review-stars-row span{font-size:12px;}
    .wf-star-f{color:#f5a623;}
    .wf-star-e{color:#ddd;}
    .wf-review-date-tag{font-size:9px;color:var(--muted);margin-left:auto;}
    .wf-review-text-box{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;}
    .wf-review-rating-detail{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
    .wf-rating-pill{font-size:10px;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text);}
    .wf-no-review{font-size:11px;color:var(--muted);font-style:italic;padding:8px 0;}

    /* COLLAPSE toggle */
    .wf-collapse-btn{background:none;border:none;font-size:11px;color:var(--brand);cursor:pointer;font-family:'Poppins',sans-serif;font-weight:500;padding:0;}

    /* EMPTY */
    .wf-empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
    .wf-empty-state svg{width:48px;height:48px;color:var(--border);margin-bottom:12px;}
    .wf-empty-state p{font-size:13px;}

    /* TOAST */
    .wf-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brand);color:var(--white);border-radius:30px;padding:10px 22px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 18px rgba(18,56,83,.25);transition:transform .3s ease;white-space:nowrap;}
    .wf-toast.show{transform:translateX(-50%) translateY(0);}

    /* BOTTOM NAV */
    .wf-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 10px;z-index:40;}
    .wf-bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif;}
    .wf-bnav-item svg{width:22px;height:22px;}
    .wf-bnav-item.active{color:var(--brand);}
  </style>
  <!-- Favicon WeFix (en todas las páginas para que no se pierda al navegar) -->
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#123853"/>
</head>
<body>

<nav class="wf-nav">
  <a class="wf-logo" href="wefix-empleado-home.html">
    <div class="wf-logo-icon">W</div>WeFix
  </a>
  <span style="font-size:13px;font-weight:600;color:var(--brand);">Mi Agenda</span>
  <div style="width:60px;"></div>
</nav>

<!-- STATS -->
<div class="wf-stats-banner">
  <div class="wf-stat-item"><div class="wf-stat-num">47</div><div class="wf-stat-lbl">Trabajos totales</div></div>
  <div class="wf-stat-item"><div class="wf-stat-num">4.8★</div><div class="wf-stat-lbl">Calificación prom.</div></div>
  <div class="wf-stat-item"><div class="wf-stat-num">$38k</div><div class="wf-stat-lbl">Ingresos totales</div></div>
</div>

<!-- TABS -->
<div class="wf-agenda-tabs">
  <button class="wf-agenda-tab active" onclick="switchTab('proximos',this)">Próximos</button>
  <button class="wf-agenda-tab" onclick="switchTab('pasados',this)">Pasados</button>
  <button class="wf-agenda-tab" onclick="switchTab('cancelados',this)">Cancelados</button>
</div>

<!-- CONTENT -->
<div id="tabContent"></div>

<div class="wf-toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="wf-bottom-nav">
  <a class="wf-bnav-item" href="wefix-empleado-home.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </a>
  <a class="wf-bnav-item active" href="wefix-empleado-agenda.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Agenda
  </a>
  <a class="wf-bnav-item" href="wefix-empleado-mensajes.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Mensajes
  </a>
  <a class="wf-bnav-item" href="wefix-empleado-perfil.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Mi perfil
  </a>
</nav>

<script>
var data = { proximos: [], pasados: [], cancelados: [] };

// Mapea una contratación de Firestore al shape que usa buildJobCard
function mapContratacion(id, c){
  var est = c.estado || 'confirmado';
  var statusMap = { confirmado:'confirmed', aceptado:'confirmed', pendiente:'pending', completado:'completed', cancelado:'cancelled', rechazado:'cancelled' };
  var nombre = c.clienteNombre || 'Cliente';
  return {
    id: id,
    client: nombre,
    initials: nombre.split(' ').filter(Boolean).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(),
    service: c.servicio || 'Servicio',
    type: 'normal', icon: '🛠️',
    date: c.fecha || 'Fecha por confirmar',
    fechaISO: c.fechaISO || '',
    time: c.hora || '—',
    duration: c.duracion || '',
    address: c.zona || '',
    price: c.total || c.precio || 0,
    status: statusMap[est] || 'confirmed',
    _estado: est,
    conversacionId: c.conversacionId || '',
    review: null,
    cancelReason: c.canceladoPor ? ('Cancelado por ' + (c.canceladoPor==='cliente'?'el cliente':(c.canceladoPor==='profesional'?'ti':'el equipo')) + '.') : null
  };
}

function cargarAgendaProfesional(uid){
  WeFix.db.collection('contrataciones').where('profesionalUid','==',uid)
    .onSnapshot(function(snap){
      var todos = snap.docs.map(function(d){ return mapContratacion(d.id, d.data()); });
      var hoyISO = new Date().toISOString().slice(0,10);
      data = { proximos: [], pasados: [], cancelados: [] };
      todos.forEach(function(j){
        if(j.status==='cancelled'){ data.cancelados.push(j); }
        else if(j.status==='completed'){ data.pasados.push(j); }
        else if(j.fechaISO && j.fechaISO < hoyISO){ data.pasados.push(j); } // fecha ya pasó
        else { data.proximos.push(j); }
      });
      // ordenar: próximos por fecha ascendente, pasados/cancelados descendente
      data.proximos.sort(function(a,b){ return (a.fechaISO||'9999').localeCompare(b.fechaISO||'9999'); });
      data.pasados.sort(function(a,b){ return (b.fechaISO||'').localeCompare(a.fechaISO||''); });
      data.cancelados.sort(function(a,b){ return (b.fechaISO||'').localeCompare(a.fechaISO||''); });
      renderTab(currentTab);
    }, function(err){ console.error(err); showToast('Error al cargar tu agenda'); });
}

var openReviews = {};

function starsHTML(n) {
  return [1,2,3,4,5].map(function(i) {
    return '<span class="' + (i<=n?'wf-star-f':'wf-star-e') + '">★</span>';
  }).join('');
}

function ratingBar(label, val) {
  return '<span class="wf-rating-pill">' + label + ': ' + starsHTML(val) + '</span>';
}

function buildJobCard(j) {
  var statusLabel = {confirmed:'Confirmado',pending:'Pendiente',completed:'Completado',cancelled:'Cancelado'};
  var reviewHTML = '';
  if (j.review) {
    var open = openReviews[j.id];
    reviewHTML = '<div class="wf-review-section">'
      + '<div class="wf-review-header-row">'
      + '<div class="wf-review-client-avatar">' + j.initials + '</div>'
      + '<div><div class="wf-review-client-name">' + j.client + '</div>'
      + '<div class="wf-review-stars-row">' + starsHTML(j.review.stars) + '<span class="wf-review-date-tag">' + j.review.date + '</span></div></div></div>'
      + (open
        ? '<div class="wf-review-text-box">"' + j.review.text + '"</div>'
          + '<div class="wf-review-rating-detail">'
          + ratingBar('Puntualidad', j.review.punctuality)
          + ratingBar('Calidad', j.review.quality)
          + ratingBar('Comunicación', j.review.communication)
          + '</div>'
          + '<button class="wf-collapse-btn" onclick="toggleReview(' + j.id + ')" style="margin-top:8px;">Ver menos ▲</button>'
        : '<button class="wf-collapse-btn" onclick="toggleReview(' + j.id + ')">Ver reseña completa ▼</button>')
      + '</div>';
  } else if (j.status === 'completed') {
    reviewHTML = '<div class="wf-review-section"><p class="wf-no-review">El cliente aún no ha dejado una reseña.</p></div>';
  } else if (j.status === 'cancelled') {
    reviewHTML = '<div class="wf-review-section"><p class="wf-no-review">Motivo: ' + (j.cancelReason||'Sin especificar') + '</p></div>';
  }

  return '<div class="wf-job-card" id="jcard' + j.id + '">'
    + '<div class="wf-job-card-header">'
    + '<div class="wf-job-type-icon ' + j.type + '">' + j.icon + '</div>'
    + '<div class="wf-job-card-info"><div class="wf-job-card-client">' + j.client + '</div>'
    + '<div class="wf-job-card-service">' + j.service + '</div></div>'
    + '<div class="wf-job-card-right"><div class="wf-job-card-price">$' + j.price + '</div>'
    + '<div class="wf-job-card-date">' + j.date + '</div></div>'
    + '</div>'
    + '<div class="wf-job-card-body">'
    + '<div class="wf-job-meta-row">'
    + '<span class="wf-job-meta">🕐 <strong>' + j.time + '</strong></span>'
    + '<span class="wf-job-meta">⏱ <strong>' + j.duration + '</strong></span>'
    + '<span class="wf-job-meta">📍 <strong>' + j.address + '</strong></span>'
    + '</div>'
    + '<div class="wf-job-status-row">'
    + '<span class="wf-job-status ' + j.status + '">' + statusLabel[j.status] + '</span>'
    + (j.status === 'confirmed' || j.status === 'pending'
      ? '<button onclick="showToast(\'Abriendo mensajes…\');setTimeout(function(){window.location.href=\'wefix-empleado-mensajes.html\'},800)" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:Poppins,sans-serif;color:var(--brand);">💬 Mensaje</button>'
        + '<button onclick="marcarCompletado(\'' + j.id + '\')" style="background:var(--green,#22c55e);border:none;border-radius:8px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:Poppins,sans-serif;color:#fff;font-weight:600;">✓ Marcar completado</button>'
      : '')
    + '</div>'
    + '</div>'
    + reviewHTML
    + '</div>';
}

function toggleReview(id) {
  openReviews[id] = !openReviews[id];
  renderTab(currentTab);
}

var currentTab = 'proximos';
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.wf-agenda-tab').forEach(function(b){b.classList.remove('active');});
  if (btn) btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  var jobs = data[tab];
  var content = document.getElementById('tabContent');
  if (!jobs || !jobs.length) {
    content.innerHTML = '<div class="wf-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No hay trabajos en esta sección</p></div>';
    return;
  }
  var html = '<div class="wf-agenda-section"><div class="wf-section-label">'
    + (tab==='proximos'?'Trabajos programados':tab==='pasados'?'Historial de trabajos':'Trabajos cancelados')
    + ' (' + jobs.length + ')</div>'
    + jobs.map(buildJobCard).join('')
    + '</div>';
  content.innerHTML = html;
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

renderTab('proximos');

// Cargar la agenda real del profesional
WeFix.ready(function(user, profile){
  if(!user) return;
  cargarAgendaProfesional(user.uid);
});

// Marcar un trabajo como completado
function marcarCompletado(id){
  if(!confirm('¿Confirmas que este servicio ya fue completado?')) return;
  var job = (data.proximos||[]).find(function(j){return j.id===id;});
  WeFix.db.collection('contrataciones').doc(id).update({
    estado:'completado', completadoAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    if(job){
      // buscar clienteUid en la contratación original
      WeFix.db.collection('contrataciones').doc(id).get().then(function(doc){
        var c = doc.data();
        if(c && c.clienteUid){
          WeFix.db.collection('notificaciones').add({
            uid:c.clienteUid, tipo:'servicio', sender:'WeFix',
            msg:'Tu servicio de '+(c.servicio||'')+' fue marcado como completado. ¡Cuéntanos cómo te fue dejando una reseña!',
            contratacionId: id, accion:'resena',
            leida:false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
          }).catch(function(){});
        }
      });
    }
    showToast('Trabajo marcado como completado ✓');
  }).catch(function(e){ console.error(e); showToast('No se pudo actualizar'); });
}
</script>
</body>
</html>
