<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeFix — Notificaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase + capa de sesion WeFix (portal profesional; exige login) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="wefix-auth.js" data-guard="require" data-role="cliente"></script>

  <style>
    :root{--bg:#f4f4f6;--brand:#123853;--accent:#f87171;--white:#fff;--border:#dde1e7;--text:#1a1a2e;--muted:#6b7280;--online:#22c55e;--onyx-a:#fbbf24;--onyx-b:#f97316;--shadow:0 2px 10px rgba(18,56,83,.10);}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Raleway',sans-serif;}
    body{background:var(--bg);max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:32px;}

    /* NAVBAR */
    .wf-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .wf-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:var(--brand);text-decoration:none;font-family:'Raleway',sans-serif;}
    .wf-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;}
    .wf-nav-right{display:flex;align-items:center;gap:10px;}
    .wf-pro-pill{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#1a4f72,#123853);color:#fff;font-size:10px;font-weight:600;padding:5px 10px;border-radius:20px;font-family:'Poppins',sans-serif;}

    /* HEADER */
    .wf-head{background:var(--white);padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .wf-head-icon{background:var(--brand);border-radius:14px;width:50px;height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .wf-head-icon svg{width:26px;height:26px;color:#fff;}
    .wf-head h1{font-size:18px;font-weight:700;color:var(--text);font-family:'Raleway',sans-serif;}
    .wf-head p{font-size:11px;color:var(--muted);margin-top:2px;font-family:'Poppins',sans-serif;}

    /* TABS */
    .wf-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;scrollbar-width:none;}
    .wf-tabs::-webkit-scrollbar{display:none;}
    .wf-tab{padding:11px 15px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Poppins',sans-serif;transition:color .18s,border-color .18s;}
    .wf-tab.active{color:var(--brand);border-bottom-color:var(--brand);}
    .wf-tab:hover{color:var(--brand);}

    .wf-bar{display:flex;justify-content:flex-end;padding:10px 18px 0;}
    .wf-mark-btn{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:'Poppins',sans-serif;}

    /* LISTA */
    .wf-list{padding:10px 16px 24px;display:flex;flex-direction:column;gap:10px;}
    .wf-item{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:14px;border:1.5px solid var(--border);padding:12px 14px;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .15s;position:relative;animation:slideIn .25s ease both;}
    .wf-item:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(18,56,83,.12);transform:translateY(-1px);}
    .wf-item.unread{border-left:3px solid var(--accent);}
    .wf-item.read{opacity:.72;}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .wf-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:'Raleway',sans-serif;}
    .wf-body{flex:1;min-width:0;}
    .wf-bubble{background:var(--brand);border-radius:0 12px 12px 12px;padding:10px 12px;position:relative;}
    .wf-bubble::before{content:'';position:absolute;top:0;left:-6px;border-width:0 6px 8px 0;border-style:solid;border-color:transparent var(--brand) transparent transparent;}
    .wf-sender{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:5px;font-family:'Poppins',sans-serif;}
    .wf-type-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;}
    .wf-msg{font-size:12px;font-weight:500;color:#fff;line-height:1.45;font-family:'Poppins',sans-serif;}
    .wf-time{font-size:9px;color:rgba(255,255,255,.6);text-align:right;margin-top:5px;font-family:'Poppins',sans-serif;}
    .wf-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
    .wf-act-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--muted);cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap;transition:all .15s;}
    .wf-act-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
    .wf-act-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
    .wf-act-btn.primary:hover{background:#1a4f72;}

    /* Estados */
    .wf-empty,.wf-loading{display:none;text-align:center;padding:60px 24px;color:var(--muted);}
    .wf-empty svg{width:56px;height:56px;color:var(--border);margin-bottom:14px;}
    .wf-empty h3{font-size:15px;color:var(--text);margin-bottom:6px;font-family:'Raleway',sans-serif;}
    .wf-empty p{font-size:12px;line-height:1.5;font-family:'Poppins',sans-serif;}
    .wf-spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;margin:0 auto 12px;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* FAB de prueba */
    .wf-fab{position:fixed;bottom:92px;right:calc(50% - 250px + 16px);background:linear-gradient(135deg,#f97316,#f87171);color:#fff;border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(248,113,113,.4);z-index:45;font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:7px;transition:transform .15s;}
    .wf-fab:hover{transform:scale(1.05);}
    .wf-fab:active{transform:scale(.97);}
    .wf-fab:disabled{opacity:.6;cursor:default;}
    @media(max-width:532px){.wf-fab{right:16px;}}

    /* Bottom nav */
    .wf-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 10px;z-index:40;}
    .wf-bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif;}
    .wf-bnav-item svg{width:22px;height:22px;}
    .wf-bnav-item.active{color:var(--brand);}

    /* Toast */
    .wf-toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--brand);color:#fff;border-radius:30px;padding:11px 20px;font-size:12.5px;font-weight:500;z-index:9999;box-shadow:0 4px 18px rgba(0,0,0,.25);transition:transform .3s ease;white-space:nowrap;font-family:'Poppins',sans-serif;max-width:92%;text-align:center;}
    .wf-toast.show{transform:translateX(-50%) translateY(0);}
  </style>
  <!-- Favicon WeFix (en todas las páginas para que no se pierda al navegar) -->
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#123853"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="wf-nav">
    <a class="wf-logo" href="wefix-home.html" style="display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:var(--brand);text-decoration:none;">
      <div style="width:32px;height:32px;border:2px solid var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--brand);">W</div>WeFix
    </a>
    <div style="display:flex;gap:18px;">
      <a href="wefix-notificaciones.html" title="Notificaciones" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--brand);font-size:9px;text-decoration:none;font-family:'Poppins',sans-serif;font-weight:600;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notificaciones
      </a>
      <a href="wefix-mensajes.html" title="Mensajes" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:9px;text-decoration:none;font-family:'Poppins',sans-serif;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Mensajes
      </a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="wf-head">
    <div class="wf-head-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    </div>
    <div>
      <h1>Notificaciones</h1>
      <p>Mensajes de tus profesionales, recordatorios y avisos de WeFix</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="wf-tabs">
    <button class="wf-tab active" data-tab="todas">Todas</button>
    <button class="wf-tab" data-tab="servicio">Servicios</button>
    <button class="wf-tab" data-tab="recordatorio">Recordatorios</button>
    <button class="wf-tab" data-tab="sistema">Sistema</button>
  </div>

  <div class="wf-bar">
    <button class="wf-mark-btn" id="markAllBtn">Marcar todas como leídas</button>
  </div>

  <!-- LOADING -->
  <div class="wf-loading" id="loadingState"><div class="wf-spin"></div><p style="font-size:12px;color:#6b7280;font-family:'Poppins',sans-serif;">Cargando notificaciones…</p></div>

  <!-- LISTA -->
  <div class="wf-list" id="notifList"></div>

  <!-- EMPTY -->
  <div class="wf-empty" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <h3>Sin notificaciones aquí</h3>
    <p>Cuando el equipo WeFix te escriba o tengas recordatorios, aparecerán en esta sección.</p>
  </div>

  <!-- BOTÓN DE PRUEBA -->
  <button class="wf-fab" id="testBtn">🧪 Crear notificación de prueba</button>


  <div class="wf-toast" id="toast"></div>

<script>
  // ════════════════════════════════════════════════════════
  //  NOTIFICACIONES DEL PROFESIONAL — Backend REAL (Firestore)
  //  Colección: "notificaciones"  ·  filtradas por uid  ·  tiempo real
  // ════════════════════════════════════════════════════════
  var currentUid = null;
  var activeTab  = 'todas';
  var notifs     = [];        // cache local de lo que llega de Firestore
  var firstLoad  = true;
  var welcomeChecked = false;

  // ── medición de latencia para el botón de prueba ──
  var testPending = false;
  var testT0 = 0;
  var testDocId = null;

  var TYPE_META = {
    mensaje:     { sender:'Mensaje nuevo',      acts:[{label:'Abrir chat', primary:true, go:'CHAT'},{label:'Descartar'}] },
    sistema:     { sender:'WeFix Sistema',      acts:[{label:'Ver perfil', primary:true, go:'wefix-perfil-usuario.html'},{label:'Descartar'}] },
    recordatorio:{ sender:'WeFix Recordatorio', acts:[{label:'Ver agenda', primary:true, go:'wefix-agenda.html'},{label:'Descartar'}] },
    servicio:    { sender:'WeFix',              acts:[{label:'Ver detalle', primary:true, go:'wefix-agenda.html'},{label:'Descartar'}] }
  };

  // Plantillas para el botón de prueba (rota entre tipos)
  var TEST_TEMPLATES = [
    { tipo:'mensaje',      msg:'Prueba: tu profesional te envió un mensaje: "¡Voy en camino!"' },
    { tipo:'servicio',     msg:'Prueba: tu servicio de limpieza ha sido confirmado para mañana a las 10 AM.' },
    { tipo:'recordatorio', msg:'Prueba: recuerda tu servicio de jardinería programado para el viernes.' },
    { tipo:'sistema',      msg:'Prueba: tu cuenta fue verificada correctamente. ¡Bienvenido a WeFix!' }
  ];
  var testIdx = 0;

  function toast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(window.__tt); window.__tt=setTimeout(function(){t.classList.remove('show');},3200);
  }

  function timeAgo(ts){
    if(!ts) return 'Ahora';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    var s = Math.floor((Date.now()-d.getTime())/1000);
    if(s<60) return 'Hace un momento';
    var m=Math.floor(s/60); if(m<60) return 'Hace '+m+' min';
    var h=Math.floor(m/60); if(h<24) return 'Hace '+h+(h===1?' hora':' horas');
    var dd=Math.floor(h/24); if(dd<30) return 'Hace '+dd+(dd===1?' día':' días');
    var mo=Math.floor(dd/30); return 'Hace '+mo+(mo===1?' mes':' meses');
  }

  function cardHTML(n,delay){
    var meta = TYPE_META[n.tipo] || TYPE_META.servicio;
    var sender = n.sender || meta.sender;
    var acts = meta.acts.map(function(a){
      return '<button class="wf-act-btn '+(a.primary?'primary':'')+'" onclick="handleAction(\''+n.id+'\',\''+a.label+'\',\''+(a.go||'')+'\',event)">'+a.label+'</button>';
    }).join('');
    return '<div class="wf-item '+(n.leida?'read':'unread')+'" style="animation-delay:'+delay+'ms" onclick="markRead(\''+n.id+'\')">'
      + '<div class="wf-av">W</div>'
      + '<div class="wf-body"><div class="wf-bubble">'
      +   '<div class="wf-sender">'+(n.leida?'':'<span class="wf-type-dot"></span>')+sender+'</div>'
      +   '<div class="wf-msg">'+n.msg+'</div>'
      +   '<div class="wf-time">'+timeAgo(n.createdAt)+'</div>'
      + '</div></div>'
      + '<div class="wf-actions">'+acts+'</div>'
      + '</div>';
  }

  function render(){
    var list=document.getElementById('notifList');
    var empty=document.getElementById('emptyState');
    var filtered = activeTab==='todas' ? notifs : notifs.filter(function(n){return n.tipo===activeTab;});
    if(!filtered.length){ list.innerHTML=''; empty.style.display='block'; }
    else { empty.style.display='none'; list.innerHTML=filtered.map(function(n,i){return cardHTML(n,i*55);}).join(''); }
  }

  // ── Acciones ──
  function markRead(id){
    var n=notifs.find(function(x){return x.id===id;});
    if(n && !n.leida){
      WeFix.db.collection('notificaciones').doc(id).update({leida:true}).catch(function(e){console.error(e);});
    }
  }
  function handleAction(id,label,go,e){
    e.stopPropagation();
    if(label==='Descartar'){
      WeFix.db.collection('notificaciones').doc(id).delete()
        .then(function(){toast('Notificación descartada');})
        .catch(function(){toast('No se pudo descartar');});
    } else if(go==='CHAT'){
      markRead(id);
      var n=notifs.find(function(x){return x.id===id;});
      window.location.href='wefix-mensajes.html'+(n&&n.convId?('?conv='+n.convId):'');
    } else if(go){
      markRead(id);
      window.location.href=go;
    } else {
      toast('"'+label+'" — próximamente');
    }
  }

  // Tabs
  document.querySelectorAll('.wf-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.wf-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active'); activeTab=tab.dataset.tab; render();
    });
  });
  // Marcar todas
  document.getElementById('markAllBtn').addEventListener('click',function(){
    var pend = notifs.filter(function(n){return !n.leida;});
    if(!pend.length){ toast('No hay notificaciones sin leer'); return; }
    var batch = WeFix.db.batch();
    pend.forEach(function(n){ batch.update(WeFix.db.collection('notificaciones').doc(n.id),{leida:true}); });
    batch.commit().then(function(){toast('Todas marcadas como leídas ✓');}).catch(function(e){console.error(e);});
  });

  // ── BOTÓN DE PRUEBA: crea una notificación y mide cuánto tarda en llegar ──
  document.getElementById('testBtn').addEventListener('click',function(){
    if(!currentUid){ toast('Inicia sesión primero'); return; }
    var btn=this; btn.disabled=true;
    var tpl = TEST_TEMPLATES[testIdx % TEST_TEMPLATES.length]; testIdx++;
    testPending=true; testT0=performance.now(); testDocId=null;
    WeFix.db.collection('notificaciones').add({
      uid: currentUid,
      tipo: tpl.tipo,
      sender: (TYPE_META[tpl.tipo]||{}).sender || 'WeFix',
      msg: tpl.msg,
      leida: false,
      prueba: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(ref){
      testDocId = ref.id;
    }).catch(function(e){
      console.error(e); testPending=false; btn.disabled=false;
      toast('Error al crear (revisa las reglas de Firestore)');
    });
    setTimeout(function(){ btn.disabled=false; },1200);
  });

  // ════════════════════════════════════════════════════════
  //  CARGA EN TIEMPO REAL desde Firestore
  // ════════════════════════════════════════════════════════
  WeFix.ready(function(user, profile){
    if(!user) return; // invitado: wefix-auth.js ya muestra la pantalla de login
    currentUid = user.uid;
    document.getElementById('loadingState').style.display='block';

    // onSnapshot = escucha en tiempo real. includeMetadataChanges para medir confirmación del servidor.
    WeFix.db.collection('notificaciones')
      .where('uid','==',currentUid)
      .onSnapshot({includeMetadataChanges:true}, function(snap){
        document.getElementById('loadingState').style.display='none';

        // Arma la lista y ordena por fecha (más reciente primero) del lado cliente
        notifs = snap.docs.map(function(d){ var o=d.data(); o.id=d.id; return o; });
        notifs.sort(function(a,b){
          var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():Date.now();
          var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():Date.now();
          return tb-ta;
        });
        render();

        // Medición de latencia del botón de prueba: cuando el doc queda CONFIRMADO por el servidor
        if(testPending && testDocId && !snap.metadata.hasPendingWrites){
          var exists = notifs.some(function(n){return n.id===testDocId;});
          if(exists){
            var ms = Math.round(performance.now()-testT0);
            testPending=false;
            toast('⚡ Notificación confirmada por el servidor en '+ms+' ms');
          }
        }

        // Notificación de bienvenida automática si el profesional no tiene ninguna
        if(firstLoad && !snap.metadata.hasPendingWrites){
          firstLoad=false;
          if(!welcomeChecked && notifs.length===0){
            welcomeChecked=true;
            var nombre = (profile&&profile.nombre)?(', '+profile.nombre.split(' ')[0]):'';
            WeFix.db.collection('notificaciones').add({
              uid: currentUid,
              tipo:'sistema',
              sender:'WeFix Sistema',
              msg:'¡Bienvenido a WeFix'+nombre+'! Tu cuenta está lista. Explora profesionales verificados y contrata tu primer servicio.',
              leida:false,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(function(e){console.error(e);});
          }
        }
      }, function(err){
        document.getElementById('loadingState').style.display='none';
        console.error('[notificaciones]', err);
        toast('Error de permisos: revisa las reglas de Firestore');
      });
  });
</script>
</body>
</html>
